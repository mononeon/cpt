name: Build and Release

on:
  push:
    tags:
      - 'v*' # Trigger on tags starting with v (e.g., v1.0.0)

permissions:
  contents: write

jobs:
  build:
    name: Build Go Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [windows, linux, darwin]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
        
    - name: Build executable
      run: |
        OUTPUT_NAME=cpt-${{ matrix.goos }}-${{ matrix.goarch }}
        if [ "${{ matrix.goos }}" = "windows" ]; then
          OUTPUT_NAME=$OUTPUT_NAME.exe
        fi
        env GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -ldflags="-s -w" -o dist/$OUTPUT_NAME ./cmd/cpt/main.go
        
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: cpt-${{ matrix.goos }}-${{ matrix.goarch }}
        path: dist/cpt-*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        merge-multiple: true
        
    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        name: CPT Release ${{ github.ref_name }}
        body: |
          🚀 **Download the latest version of CPT!**
          
          This is a blazing fast Go-based release.
          
          **Windows:** Download `cpt-windows-amd64.exe` and rename it to `cpt.exe`.
          **Mac:** Download `cpt-darwin-arm64` (Apple Silicon) or `cpt-darwin-amd64` (Intel) and run `chmod +x` on it.
          **Linux:** Download `cpt-linux-amd64` and run `chmod +x` on it.
          
          Check the README for quick installation instructions.
        files: artifacts/*
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
